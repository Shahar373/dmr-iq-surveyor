inspection:
  statistics_window_frames: 250000
  diagnostic_plot_frames: 20000
  compute_sha256: true
  assumed_iq_order: IQ

spectrum:
  fft_size: 65536
  window: hann
  overlap_ratio: 0.5
  waterfall_time_bins: 500
  waterfall_frequency_bins: 8192
  edge_exclusion_hz: 150000
  dc_exclusion_hz: 10000
  percentile: 95
  percentile_max_frames: 256
  local_noise_window_hz: 200000
  occupancy_threshold_db: 8.0

detection:
  scan_step_hz: 6250
  integration_width_hz: 10000
  min_p95_channel_snr_db: 9.0
  min_average_channel_snr_db: 4.0
  min_equivalent_width_hz: 1500
  min_width_90_hz: 3000
  max_width_90_hz: 12000
  max_peak_to_channel_mean_db: 13.0
  min_fill_ratio: 0.20
  fill_threshold_db: 6.0
  merge_tolerance_hz: 3000
  passband_warning_low_hz: 159490000
  passband_warning_high_hz: 167680000

channel_extraction:
  chunk_frames: 1000000
  first_decimation: 10
  second_decimation: 10
  first_filter_taps: 401
  second_filter_taps: 801
  channel_filter_taps: 161
  first_cutoff_hz: 400000
  second_cutoff_hz: 40000
  channel_lowpass_hz: 7500
  output_rate_hz: 48000
  trim_seconds: 0.005
  normalization_percentile: 99.5
  output_peak_fraction: 0.90
  preview_samples: 100000

decoder:
  binary: dsd-fme
  timeout_seconds: 120
  inversions:
    - normal
    - inverted

phase4:
  max_candidates: 8
  candidate_classes:
    - dmr_like_narrowband
  minimum_confidence: 0.0
  iq_hypotheses:
    - IQ
  run_decoder: true

phase5:
  max_gap_lines: 12
  database_path: runs/inventory/dmr_inventory.sqlite3
